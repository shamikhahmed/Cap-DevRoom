<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cap · DevRoom v3.1.0 — Investor Pitch</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#0a0a0c;--bg3:#12121a;
  --gold:#c9a227;--gold2:#f0d060;--gold-dim:#8b6914;
  --text:#f5f5f7;--text2:#a1a1aa;--text3:#52525b;
  --ok:#30d158;--warn:#ffd60a;--err:#ff453a;
  --border:rgba(255,255,255,.08);
  --glow:rgba(201,162,39,.22);
  --mono:'SF Mono','Fira Code',Consolas,monospace;
  --sans:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --spring:cubic-bezier(.34,1.56,.64,1);
  --ease:cubic-bezier(.22,1,.36,1);
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45}
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse 80% 60% at 20% 20%,rgba(201,162,39,.12),transparent 50%),
  radial-gradient(ellipse 60% 50% at 80% 80%,rgba(139,105,20,.08),transparent 50%);
  animation:auroraShift 18s ease-in-out infinite alternate}
@keyframes auroraShift{0%{opacity:.6;transform:scale(1)}100%{opacity:1;transform:scale(1.08)}}
#progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold-dim),var(--gold2));z-index:300;transition:width .5s var(--ease);box-shadow:0 0 12px var(--glow)}
#counter{position:fixed;bottom:36px;right:40px;font-family:var(--mono);font-size:11px;color:var(--text3);z-index:300;letter-spacing:.1em}
#dots{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:300;align-items:center;max-width:90vw;flex-wrap:wrap;justify-content:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);border:none;transition:all .35s var(--spring);cursor:pointer;padding:0}
.dot.on{width:20px;border-radius:3px;background:var(--gold);box-shadow:0 0 10px var(--glow)}
#fsBtn,#overviewBtn{position:fixed;top:24px;z-index:300;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:99px;font-size:11px;cursor:pointer;letter-spacing:.04em;transition:background .2s}
#fsBtn{right:24px}#overviewBtn{right:110px}
#fsBtn:hover,#overviewBtn:hover{background:rgba(255,255,255,.12);color:var(--text)}
#hint{position:fixed;top:24px;left:24px;z-index:300;font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
#deck{position:relative;width:100vw;height:100vh;z-index:1;perspective:1400px}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:56px 72px;opacity:0;pointer-events:none;transform:translateZ(-120px) rotateX(4deg) scale(.94);transition:opacity .55s var(--ease),transform .65s var(--ease);transform-style:preserve-3d}
.slide.active{opacity:1;pointer-events:auto;transform:translateZ(0) rotateX(0) scale(1)}
.slide.exit{opacity:0;transform:translateZ(-80px) rotateX(-2deg) scale(1.02)}
.anim{opacity:0;transform:translateY(28px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.slide.active .anim{opacity:1;transform:translateY(0)}
.slide.active .anim:nth-child(1){transition-delay:.04s}
.slide.active .anim:nth-child(2){transition-delay:.12s}
.slide.active .anim:nth-child(3){transition-delay:.2s}
.slide.active .anim:nth-child(4){transition-delay:.28s}
.slide.active .anim:nth-child(5){transition-delay:.36s}
.slide.active .anim:nth-child(6){transition-delay:.44s}
.slide.active .anim:nth-child(7){transition-delay:.52s}
.slide.active .anim:nth-child(8){transition-delay:.6s}
.label{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
h1{font-size:clamp(48px,7.5vw,88px);font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:18px;text-align:center}
h2{font-size:clamp(26px,4vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1.12;margin-bottom:16px;text-align:center}
.tagline{font-size:clamp(15px,1.9vw,20px);color:var(--text2);line-height:1.6;max-width:680px;text-align:center}
.accent{color:var(--gold);background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.divider{width:48px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:2px;margin:20px auto;box-shadow:0 0 12px var(--glow)}
.letter{display:inline-block;opacity:0;transform:translateY(50px) rotateX(-40deg);animation:letterUp .7s var(--spring) forwards}
@keyframes letterUp{to{opacity:1;transform:translateY(0) rotateX(0)}}
.glass{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:18px}
.stat-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:24px}
.stat{background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.25);border-radius:16px;padding:18px 26px;text-align:center;min-width:130px;transition:transform .3s var(--spring),box-shadow .3s}
.stat:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 24px var(--glow)}
.sv{font-family:var(--mono);font-size:clamp(24px,3.5vw,36px);font-weight:700;color:var(--gold2);letter-spacing:-.02em}
.sk{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:920px;margin-top:24px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:920px;margin-top:24px}
.card{padding:22px;text-align:left;transition:transform .35s var(--spring),border-color .35s}
.card:hover{transform:translateY(-3px);border-color:rgba(201,162,39,.35)}
.card h3{font-size:14px;margin-bottom:8px;color:var(--gold2);font-weight:700}
.card p,.card li{font-size:13px;color:var(--text2);line-height:1.55}
.flow{display:flex;align-items:center;gap:0;flex-wrap:wrap;justify-content:center;margin:24px 0}
.flow-node{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:12px;font-weight:600;text-align:center}
.flow-arrow{color:var(--gold);font-size:18px;margin:0 6px;opacity:.7}
.checklist{text-align:left;max-width:620px;width:100%;margin-top:20px;list-style:none}
.checklist li{padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--text2);display:flex;gap:10px;align-items:flex-start}
.checklist li::before{content:'✓';color:var(--ok);font-weight:700;flex-shrink:0}
.checklist li.warn::before{content:'!';color:var(--warn)}
.meta{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:20px;text-align:center}
/* 3D Phone */
.phone-stage{perspective:1200px;margin-top:28px;display:flex;gap:32px;align-items:center;justify-content:center;flex-wrap:wrap}
.phone-wrap{transform-style:preserve-3d;transition:transform .15s ease-out}
.phone{
  width:220px;height:460px;border-radius:36px;padding:10px;
  background:linear-gradient(145deg,#2a2a2e,#0d0d0f);
  box-shadow:0 40px 80px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.12),inset 0 1px 0 rgba(255,255,255,.15);
  transform-style:preserve-3d;position:relative;
}
.phone::before{content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:72px;height:22px;background:#000;border-radius:12px;z-index:2}
.phone-screen{width:100%;height:100%;border-radius:28px;overflow:hidden;background:#0a0a0c;object-fit:cover;object-position:top;display:block}
.phone-label{margin-top:14px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.06em}
.phone-hero{transform:rotateY(-18deg) rotateX(6deg)}
.phone-side-l{transform:rotateY(22deg) rotateX(4deg) scale(.92);opacity:.85}
.phone-side-r{transform:rotateY(-22deg) rotateX(4deg) scale(.92);opacity:.85}
/* Desktop screenshot */
.shot-wrap{position:relative;margin-top:24px;max-width:min(960px,92vw);transform-style:preserve-3d}
.shot{
  width:100%;max-height:min(480px,52vh);object-fit:contain;border-radius:14px;
  border:1px solid var(--border);box-shadow:0 32px 80px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05);
  transform:rotateX(2deg);transition:transform .4s var(--ease)
}
.shot-wrap:hover .shot{transform:rotateX(0) scale(1.01)}
.shot-glow{position:absolute;inset:-20%;background:radial-gradient(ellipse at center,var(--glow),transparent 70%);z-index:-1;opacity:.5;pointer-events:none}
/* Overview grid */
#overview{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.92);backdrop-filter:blur(24px);display:none;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:80px 40px 40px;overflow-y:auto;align-content:start}
#overview.open{display:grid}
.ov-item{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .25s var(--spring);font-size:11px;color:var(--text2)}
.ov-item:hover,.ov-item.on{border-color:var(--gold);background:rgba(201,162,39,.1);color:var(--text);transform:scale(1.03)}
.ov-num{font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:6px}
#ovClose{position:fixed;top:24px;right:24px;z-index:401;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:99px;cursor:pointer;display:none;font-size:12px}
#overview.open+#ovClose{display:block}
.pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.pill{background:rgba(201,162,39,.12);border:1px solid rgba(201,162,39,.3);border-radius:99px;padding:7px 16px;font-size:12px;font-weight:600;color:var(--gold2)}
@media(max-width:768px){
  .slide{padding:32px 20px}
  .grid2,.grid3{grid-template-columns:1fr}
  .phone-stage{gap:16px}
  .phone{width:160px;height:340px;border-radius:28px}
  #hint{display:none}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="aurora"></div>
<div id="progress"></div>
<div id="counter"></div>
<div id="hint">← → navigate · swipe · esc overview</div>
<button id="overviewBtn" type="button">Overview</button>
<button id="fsBtn" type="button">Fullscreen</button>
<div id="dots"></div>
<div id="overview"></div>
<button id="ovClose" type="button">Close</button>
<div id="deck"></div>

/* ── DOM ── */
const deck = document.getElementById('deck');
const dotsEl = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const progressEl = document.getElementById('progress');
const overviewEl = document.getElementById('overview');
let idx = 0, prevIdx = 0, touchX = 0;

slides.forEach((s, i) => {
  const el = document.createElement('section');
  el.className = 'slide' + (i === 0 ? ' active' : '');
  el.dataset.index = i;
  el.innerHTML = s.html;
  deck.appendChild(el);

  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' on' : '');
  dot.setAttribute('aria-label', s.title);
  dot.onclick = () => go(i);
  dotsEl.appendChild(dot);

  const ov = document.createElement('div');
  ov.className = 'ov-item' + (i === 0 ? ' on' : '');
  ov.innerHTML = `<div class="ov-num">${String(i+1).padStart(2,'0')}</div>${s.title}`;
  ov.onclick = () => { closeOverview(); go(i); };
  overviewEl.appendChild(ov);
});

function animateHeroLetters() {
  const el = document.getElementById('heroTitle');
  if (!el || el.dataset.done) return;
  const text = 'Cap · DevRoom';
  el.innerHTML = text.split('').map((c, i) =>
    c === ' ' ? ' ' : `<span class="letter" style="animation-delay:${i * 0.04}s">${c}</span>`
  ).join('');
  el.dataset.done = '1';
}

function animateCounters(slide) {
  slide.querySelectorAll('[data-count]').forEach(el => {
    const target = +el.dataset.count;
    if (el.dataset.animated) return;
    el.dataset.animated = '1';
    let n = 0;
    const step = () => {
      n += Math.ceil(target / 24);
      if (n >= target) { el.textContent = target; return; }
      el.textContent = n;
      requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
}

function go(n, dir = 1) {
  const all = deck.querySelectorAll('.slide');
  const allDots = dotsEl.querySelectorAll('.dot');
  const allOv = overviewEl.querySelectorAll('.ov-item');
  if (n === idx) return;
  prevIdx = idx;
  all[idx].classList.remove('active');
  all[idx].classList.add('exit');
  allDots[idx].classList.remove('on');
  allOv[idx]?.classList.remove('on');
  idx = (n + slides.length) % slides.length;
  setTimeout(() => all[prevIdx].classList.remove('exit'), 500);
  all[idx].classList.add('active');
  allDots[idx].classList.add('on');
  allOv[idx]?.classList.add('on');
  counterEl.textContent = String(idx + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
  progressEl.style.width = ((idx + 1) / slides.length * 100) + '%';
  document.title = slides[idx].title + ' — Cap · DevRoom';
  if (slides[idx].id === 'hero') animateHeroLetters();
  animateCounters(all[idx]);
}

function openOverview() { overviewEl.classList.add('open'); }
function closeOverview() { overviewEl.classList.remove('open'); }

document.getElementById('overviewBtn').onclick = openOverview;
document.getElementById('ovClose').onclick = closeOverview;
document.getElementById('fsBtn').onclick = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
};

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { overviewEl.classList.contains('open') ? closeOverview() : openOverview(); return; }
  if (overviewEl.classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(idx + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(idx - 1); }
  if (e.key === 'Home') go(0);
  if (e.key === 'End') go(slides.length - 1);
});

document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 60) go(idx + (dx < 0 ? 1 : -1));
});

/* 3D phone tilt */
document.addEventListener('mousemove', e => {
  const mx = (e.clientX / window.innerWidth - 0.5) * 2;
  const my = (e.clientY / window.innerHeight - 0.5) * 2;
  document.querySelectorAll('[data-tilt]').forEach((wrap, i) => {
    const base = wrap.classList.contains('phone-hero') ? 0 : (wrap.classList.contains('phone-side-l') ? 18 : -18);
    const rx = my * -6;
    const ry = base + mx * 10;
    wrap.style.transform = `rotateY(${ry}deg) rotateX(${rx}deg)`;
  });
  const active = deck.querySelector('.slide.active');
  if (active && !active.querySelector('.phone-stage')) {
    active.style.transform = `translateZ(0) rotateX(${my * -1.5}deg) rotateY(${mx * 1.5}deg)`;
  }
});

/* Particles */
(function particles() {
  const c = document.getElementById('particles');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 90; i++) {
    pts.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.8 + 0.4, a: Math.random() * 0.35 + 0.08
    });
  }
  function frame() {
    ctx.clearRect(0, 0, W, H);
    pts.forEach((p, i) => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,162,39,${p.a})`;
      ctx.fill();
      for (let j = i + 1; j < pts.length; j++) {
        const q = pts[j];
        const d = Math.hypot(p.x - q.x, p.y - q.y);
        if (d < 110) {
          ctx.strokeStyle = `rgba(201,162,39,${0.06 * (1 - d / 110)})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.stroke();
        }
      }
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

go(0);
animateHeroLetters();
animateCounters(deck.querySelector('.slide.active'));
</script>
</body>
</html>
