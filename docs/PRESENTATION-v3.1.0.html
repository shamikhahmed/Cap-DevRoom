<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cap · DevRoom — Cinematic Pitch · v3.1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020203;--gold:#e8c547;--gold2:#fff3b0;--gold-dim:#a6841f;
  --cyan:#67e8f9;--violet:#c4b5fd;--text:#fafafa;--text2:#a1a1aa;--text3:#52525b;
  --border:rgba(255,255,255,.08);--mono:'SF Mono',Consolas,monospace;
  --sans:'Inter',system-ui,sans-serif;--display:'Space Grotesk',var(--sans);
  --ease:cubic-bezier(.16,1,.3,1);
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;cursor:none}
@media(max-width:768px){html,body{cursor:auto}}
#webgl{position:fixed;inset:0;z-index:0}
#grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain .4s steps(2) infinite}
@keyframes grain{to{transform:translate(-3%,2%)}}
#cursor,#cursor-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cursor{width:8px;height:8px;background:var(--gold);mix-blend-mode:difference}
#cursor-ring{width:40px;height:40px;border:1px solid rgba(232,197,71,.45);transition:width .3s var(--ease),height .3s var(--ease),border-color .3s}
#cursor-ring.hover{width:56px;height:56px;border-color:var(--cyan)}
@media(max-width:768px){#cursor,#cursor-ring{display:none}}
.ui{position:fixed;z-index:100;pointer-events:none}
.ui *{pointer-events:auto}
#ringProgress{top:24px;left:24px;width:44px;height:44px}
#chapter{top:28px;left:84px;font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--text3)}
#chapter em{font-style:normal;color:var(--gold)}
.toolbar{top:20px;right:20px;display:flex;gap:8px}
.btn{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid var(--border);color:var(--text2);padding:9px 16px;border-radius:99px;font-size:11px;font-weight:700;cursor:none;font-family:var(--sans);transition:all .25s var(--ease)}
.btn:hover{border-color:rgba(232,197,71,.4);color:var(--text);background:rgba(255,255,255,.08)}
.btn.on{border-color:var(--gold);color:var(--gold2)}
#counter{bottom:32px;right:32px;font-family:var(--mono);font-size:11px;color:var(--text3)}
#dots{bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:6px;max-width:90vw;flex-wrap:wrap;justify-content:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);border:none;padding:0;cursor:none;transition:all .4s var(--ease)}
.dot.on{width:24px;border-radius:3px;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
#deck{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;perspective:2000px}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 88px;opacity:0;visibility:hidden;transform-style:preserve-3d}
.slide.split{flex-direction:row;gap:56px;align-items:center}
.slide.on{visibility:visible}
.col-copy{flex:1;max-width:480px;text-align:left}
.col-vis{flex:1;display:flex;justify-content:center;max-width:580px}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.hero-title,h2.split-target{font-family:var(--display);font-weight:700;letter-spacing:-.04em;line-height:.95;margin-bottom:18px;font-size:clamp(40px,6vw,76px);text-align:center}
.slide.split .hero-title,.slide.split h2.split-target{text-align:left}
.lead,.body{font-size:clamp(15px,1.7vw,19px);line-height:1.65;color:var(--text2);max-width:680px}
.lead strong,.body strong{color:var(--text)}
.center{text-align:center;margin-left:auto;margin-right:auto}
.caption{font-size:13px;color:var(--text3);margin-top:12px}
.meta{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:24px}
.pull-quote{font-family:var(--display);font-size:clamp(24px,3.5vw,40px);font-weight:600;line-height:1.35;max-width:760px;text-align:center;border-left:3px solid var(--gold);padding-left:28px;text-align:left;margin:0 auto}
.pull-quote em{font-style:normal;background:linear-gradient(135deg,var(--gold2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:28px}
.stat-grid.compact{margin-top:16px}
.stat-card{min-width:130px;padding:20px 24px;text-align:center;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(12px)}
.stat-num{display:block;font-family:var(--mono);font-size:clamp(28px,4vw,38px);font-weight:800;color:var(--gold2);letter-spacing:-.03em}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-top:6px;display:block}
.glass-card{padding:22px;border-radius:20px;background:rgba(255,255,255,.03);border:1px solid var(--border);backdrop-filter:blur(16px);transition:transform .4s var(--ease),box-shadow .4s,border-color .4s}
.glass-card:hover{border-color:rgba(232,197,71,.3);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(232,197,71,.06)}
.card-grid{display:grid;gap:14px;width:100%;max-width:920px;margin-top:24px}
.card-grid.two{grid-template-columns:1fr 1fr}
.card-grid.three{grid-template-columns:repeat(3,1fr)}
.card-num{font-family:var(--mono);font-size:11px;color:var(--gold);display:block;margin-bottom:8px}
.glass-card h3{font-size:14px;font-weight:800;color:var(--gold2);margin-bottom:8px}
.glass-card p{font-size:13px;color:var(--text2);line-height:1.6}
.bar-chart{width:100%;max-width:560px;margin-top:24px}
.bar-chart.compact{max-width:480px}
.bar-item{display:grid;grid-template-columns:120px 1fr 48px;align-items:center;gap:12px;margin-bottom:12px;font-size:12px;color:var(--text2)}
.bar-track{height:8px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold-dim),var(--gold2));border-radius:99px;transition:width 1.4s var(--ease)}
.bar-val{font-family:var(--mono);font-size:11px;color:var(--text3);text-align:right}
.pipeline{display:flex;align-items:center;flex-wrap:wrap;justify-content:center;gap:4px;margin:28px 0;max-width:880px}
.pipe-step{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center;min-width:90px}
.pipe-step b{display:block;font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:4px}
.pipe-step span{font-size:11px;font-weight:600;color:var(--text)}
.pipe-line{width:20px;height:1px;background:linear-gradient(90deg,var(--gold-dim),var(--cyan));opacity:.5}
.check-list{list-style:none;max-width:560px;margin-top:20px;width:100%}
.check-list.wide{max-width:640px}
.check-list li{padding:12px 0 12px 28px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text2);position:relative;line-height:1.5}
.check-list li::before{content:'';position:absolute;left:0;top:14px;width:16px;height:16px;border-radius:50%;background:rgba(52,211,153,.15);border:1px solid #34d399}
.agent-wall{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:680px;width:100%;margin-top:20px}
.agent-tile{padding:12px 8px;text-align:center;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:11px;font-weight:800;color:var(--text2);transition:all .3s}
.agent-tile span{display:block;font-size:9px;font-weight:500;color:var(--text3);margin-top:4px;font-family:var(--mono)}
.agent-tile.lead{border-color:rgba(232,197,71,.35);color:var(--gold2)}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.pill{font-size:11px;font-weight:700;padding:8px 16px;border-radius:99px;border:1px solid rgba(232,197,71,.3);color:var(--gold2);background:rgba(232,197,71,.08)}
.eco-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:820px;margin-top:24px;width:100%}
.eco-icon{font-size:24px;margin-bottom:10px;opacity:.8}
.screen-3d{border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:0 40px 100px rgba(0,0,0,.55),0 0 80px rgba(232,197,71,.08);transform-style:preserve-3d;transition:transform .4s var(--ease)}
.screen-3d img{width:100%;display:block;max-height:min(480px,52vh);object-fit:cover;object-position:top}
.device-hero{border-radius:28px;overflow:hidden;border:1px solid var(--border);box-shadow:0 40px 80px rgba(0,0,0,.6);max-width:260px}
.device-hero img{width:100%;display:block}
.carousel-scene{width:100%;max-width:900px;height:420px;margin-top:16px;perspective:1400px;position:relative;touch-action:none}
.carousel-ring{position:absolute;left:50%;top:50%;width:0;height:0;transform-style:preserve-3d;cursor:grab}
.carousel-ring:active{cursor:grabbing}
.carousel-item{position:absolute;left:-100px;top:-200px;width:200px;height:400px;transform-style:preserve-3d;transition:filter .3s}
.carousel-item .device{background:linear-gradient(160deg,#3a3a42,#0a0a0c);border-radius:32px;padding:10px;box-shadow:0 40px 80px rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.1)}
.carousel-item img{width:100%;height:360px;object-fit:cover;object-position:top;border-radius:24px;display:block}
.carousel-item span{display:block;text-align:center;margin-top:10px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.carousel-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:8px;letter-spacing:.06em}
#overview{position:fixed;inset:0;z-index:200;background:rgba(2,2,3,.94);backdrop-filter:blur(32px);display:none;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:80px 32px 32px;overflow-y:auto}
#overview.open{display:grid}
.ov{padding:16px;border-radius:14px;border:1px solid var(--border);cursor:none;background:rgba(255,255,255,.02);transition:all .25s}
.ov:hover,.ov.on{border-color:var(--gold);background:rgba(232,197,71,.08);transform:scale(1.02)}
.ov-num{font-family:var(--mono);font-size:10px;color:var(--gold)}
.ov-title{font-size:12px;font-weight:700;color:var(--text2);margin-top:4px}
.ov.on .ov-title{color:var(--text)}
#notes{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(0,0,0,.9);backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:18px 32px;transform:translateY(100%);transition:transform .45s var(--ease);max-height:30vh;overflow-y:auto}
#notes.open{transform:translateY(0)}
#notes h4{font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
#notes p{font-size:13px;color:var(--text2);line-height:1.65;max-width:880px}
.char{display:inline-block;will-change:transform,opacity}
@media(max-width:900px){
  .slide,.slide.split{padding:32px 20px;flex-direction:column}
  .hero-title,h2.split-target,.pull-quote{text-align:center}
  .card-grid.two,.card-grid.three,.eco-grid,.agent-wall{grid-template-columns:1fr}
  .carousel-scene{height:360px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  #webgl{display:none}
}
</style>
</head>
<body>
<canvas id="webgl"></canvas>
<div id="grain"></div>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<svg class="ui" id="ringProgress" viewBox="0 0 44 44"><circle cx="22" cy="22" r="20" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2"/><circle id="ringArc" cx="22" cy="22" r="20" fill="none" stroke="url(#rg)" stroke-width="2" stroke-linecap="round" stroke-dasharray="125.6" stroke-dashoffset="125.6" transform="rotate(-90 22 22)"/><defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e8c547"/><stop offset="1" stop-color="#67e8f9"/></linearGradient></defs></svg>
<div class="ui" id="chapter">Ch <em>01</em></div>
<div class="ui toolbar">
  <button class="btn magnetic" id="playBtn" type="button">▶ Auto</button>
  <button class="btn magnetic" id="notesBtn" type="button">Notes</button>
  <button class="btn magnetic" id="mapBtn" type="button">Map</button>
  <button class="btn magnetic" id="fsBtn" type="button">Fullscreen</button>
</div>
<div class="ui" id="counter">01 / 20</div>
<div class="ui" id="dots"></div>
<div id="overview"></div>
<div id="notes"><h4>Speaker notes</h4><p id="notesText"></p></div>
<div id="deck"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="presentation-slides.js"></script>
<script>
(function(){
  const DATA = window.CAP_DEVROOM_SLIDES;
  const deck = document.getElementById('deck');
  const themes = { gold:'#e8c547', cyan:'#67e8f9', violet:'#c4b5fd', red:'#f87171' };
  let idx = 0, autoTimer = null, carouselAngle = 0, carouselDragging = false;

  /* ── Build slides ── */
  DATA.forEach((s, i) => {
    const el = document.createElement('section');
    el.className = 'slide' + (s.split ? ' split' : '') + (i === 0 ? ' on' : '');
    el.dataset.theme = s.theme || 'gold';
    el.innerHTML = s.html;
    deck.appendChild(el);
    s.el = el;

    const dot = document.createElement('button');
    dot.className = 'dot magnetic' + (i === 0 ? ' on' : '');
    dot.onclick = () => go(i);
    document.getElementById('dots').appendChild(dot);

    const ov = document.createElement('div');
    ov.className = 'ov magnetic' + (i === 0 ? ' on' : '');
    ov.innerHTML = `<div class="ov-num">${s.ch}</div><div class="ov-title">${s.title}</div>`;
    ov.onclick = () => { closeMap(); go(i); };
    document.getElementById('overview').appendChild(ov);
  });

  /* ── Three.js WebGL ── */
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    const canvas = document.getElementById('webgl');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
    camera.position.z = 28;
    const resize = () => {
      renderer.setSize(innerWidth, innerHeight);
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
    };
    resize();
    addEventListener('resize', resize);

    const N = 2400;
    const pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const r = 8 + Math.random() * 22;
      const t = Math.random() * Math.PI * 2;
      const p = Math.acos(2 * Math.random() - 1);
      pos[i * 3] = r * Math.sin(p) * Math.cos(t);
      pos[i * 3 + 1] = r * Math.sin(p) * Math.sin(t);
      pos[i * 3 + 2] = r * Math.cos(p);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pts = new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0xe8c547, size: 0.06, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending, depthWrite: false
    }));
    scene.add(pts);

    const ringGeo = new THREE.TorusGeometry(14, 0.02, 8, 128);
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0x67e8f9, transparent: true, opacity: 0.12, wireframe: true }));
    ring.rotation.x = Math.PI / 2.5;
    scene.add(ring);

    let mx = 0, my = 0;
    addEventListener('mousemove', e => { mx = (e.clientX / innerWidth - 0.5) * 2; my = (e.clientY / innerHeight - 0.5) * 2; });

    (function anim() {
      requestAnimationFrame(anim);
      pts.rotation.y += 0.0004;
      pts.rotation.x += 0.00015;
      ring.rotation.z += 0.001;
      camera.position.x += (mx * 3 - camera.position.x) * 0.03;
      camera.position.y += (-my * 2 - camera.position.y) * 0.03;
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
    })();
  }

  /* ── Custom cursor + magnetic ── */
  const cur = document.getElementById('cursor'), ring = document.getElementById('cursor-ring');
  let cx = innerWidth / 2, cy = innerHeight / 2, rx = cx, ry = cy;
  addEventListener('mousemove', e => { cx = e.clientX; cy = e.clientY; });
  (function cursorLoop() {
    rx += (cx - rx) * 0.22; ry += (cy - ry) * 0.22;
    cur.style.left = cx + 'px'; cur.style.top = cy + 'px';
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    document.querySelectorAll('.magnetic').forEach(el => {
      const r = el.getBoundingClientRect();
      const dx = cx - (r.left + r.width / 2), dy = cy - (r.top + r.height / 2);
      const dist = Math.hypot(dx, dy);
      if (dist < 120) {
        el.style.transform = `translate(${dx * 0.12}px, ${dy * 0.12}px)`;
        el.addEventListener('mouseenter', () => ring.classList.add('hover'), { once: true });
      } else el.style.transform = '';
    });
    requestAnimationFrame(cursorLoop);
  })();

  /* ── Split text ── */
  function splitText(el) {
    if (!el || el.dataset.split) return;
    el.dataset.split = '1';
    const text = el.textContent;
    el.textContent = '';
    text.split('').forEach(ch => {
      const s = document.createElement('span');
      s.className = 'char';
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      el.appendChild(s);
    });
  }

  /* ── Carousel 3D ── */
  function initCarousel(slide) {
    const scene = slide.querySelector('.carousel-scene');
    if (!scene || scene.dataset.ready) return;
    scene.dataset.ready = '1';
    const ring = scene.querySelector('.carousel-ring');
    const items = [...scene.querySelectorAll('.carousel-item')];
    const n = items.length, radius = 280;
    items.forEach((item, i) => {
      const a = (i / n) * Math.PI * 2;
      item.style.transform = `rotateY(${a}rad) translateZ(${radius}px)`;
      item.onclick = () => {
        carouselAngle = -a + Math.PI / 2;
        gsap.to(ring, { rotateY: carouselAngle * (180 / Math.PI), duration: 0.9, ease: 'power3.out' });
      };
    });
    let startX = 0, startAngle = 0;
    scene.addEventListener('pointerdown', e => { carouselDragging = true; startX = e.clientX; startAngle = carouselAngle; scene.setPointerCapture(e.pointerId); });
    scene.addEventListener('pointermove', e => {
      if (!carouselDragging) return;
      carouselAngle = startAngle + (e.clientX - startX) * 0.005;
      ring.style.transform = `rotateY(${carouselAngle * (180 / Math.PI)}deg)`;
    });
    scene.addEventListener('pointerup', () => { carouselDragging = false; });
    gsap.from(ring, { rotateY: -30, duration: 1.2, ease: 'power3.out' });
  }

  /* ── Slide transition (GSAP) ── */
  function animateIn(slide) {
    slide.querySelectorAll('.split-target').forEach(splitText);
    const chars = slide.querySelectorAll('.char');
    const rv = slide.querySelectorAll('.rv');
    const bars = slide.querySelectorAll('.bar-fill');

    gsap.fromTo(slide, { opacity: 0, scale: 0.96, filter: 'blur(12px)' }, { opacity: 1, scale: 1, filter: 'blur(0px)', duration: 0.85, ease: 'power3.out' });

    if (chars.length) {
      gsap.fromTo(chars, { y: 80, opacity: 0, rotateX: -90 }, { y: 0, opacity: 1, rotateX: 0, stagger: 0.018, duration: 0.7, ease: 'power3.out', delay: 0.1 });
    }
    gsap.fromTo(rv, { y: 50, opacity: 0 }, { y: 0, opacity: 1, stagger: 0.07, duration: 0.65, ease: 'power3.out', delay: 0.05 });

    bars.forEach(bar => {
      gsap.to(bar, { width: bar.dataset.w + '%', duration: 1.2, ease: 'power2.out', delay: 0.3 });
    });

    slide.querySelectorAll('[data-count]').forEach(el => {
      if (el.dataset.done) return;
      el.dataset.done = '1';
      const t = +el.dataset.count;
      gsap.fromTo(el, { textContent: 0 }, { textContent: t, duration: 1.4, ease: 'power2.out', snap: { textContent: 1 }, delay: 0.2 });
    });

    if (slide.querySelector('.carousel-scene')) initCarousel(slide);

    const screen = slide.querySelector('.screen-3d');
    if (screen) {
      gsap.fromTo(screen, { rotateY: -12, rotateX: 8, z: -80 }, { rotateY: 0, rotateX: 0, z: 0, duration: 1, ease: 'power3.out', delay: 0.15 });
    }
  }

  function go(n) {
    if (n === idx || n < 0 || n >= DATA.length) return;
    const prev = DATA[idx].el, next = DATA[n].el;
    const dots = document.querySelectorAll('.dot');
    const ovs = document.querySelectorAll('.ov');

    gsap.to(prev, {
      opacity: 0, scale: 1.03, filter: 'blur(10px)', duration: 0.45, ease: 'power2.in',
      onComplete: () => { prev.classList.remove('on'); }
    });

    idx = n;
    next.classList.add('on');
    document.body.style.setProperty('--accent', themes[DATA[idx].theme] || themes.gold);
    dots.forEach((d, i) => d.classList.toggle('on', i === idx));
    ovs.forEach((o, i) => o.classList.toggle('on', i === idx));

    document.getElementById('chapter').innerHTML = `Ch <em>${DATA[idx].ch}</em> · ${DATA[idx].title}`;
    document.getElementById('counter').textContent = `${DATA[idx].ch} / 20`;
    document.getElementById('notesText').textContent = DATA[idx].note;
    document.title = `${DATA[idx].title} — Cap · DevRoom`;

    const prog = (idx + 1) / DATA.length;
    gsap.to('#ringArc', { strokeDashoffset: 125.6 * (1 - prog), duration: 0.6, ease: 'power2.out' });

    animateIn(next);
  }

  function openMap() { document.getElementById('overview').classList.add('open'); }
  function closeMap() { document.getElementById('overview').classList.remove('open'); }

  document.getElementById('mapBtn').onclick = openMap;
  document.getElementById('fsBtn').onclick = () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen?.();
  document.getElementById('notesBtn').onclick = function () {
    this.classList.toggle('on');
    document.getElementById('notes').classList.toggle('open');
  };
  document.getElementById('playBtn').onclick = function () {
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; this.textContent = '▶ Auto'; this.classList.remove('on'); return; }
    this.textContent = '⏸ Auto'; this.classList.add('on');
    autoTimer = setInterval(() => go((idx + 1) % DATA.length), 8000);
  };

  addEventListener('keydown', e => {
    if (e.key === 'Escape') { document.getElementById('overview').classList.contains('open') ? closeMap() : openMap(); return; }
    if (e.key === 'n' || e.key === 'N') { document.getElementById('notesBtn').click(); return; }
    if (document.getElementById('overview').classList.contains('open')) return;
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(idx + 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); go(idx - 1); }
  });

  let touchX = 0;
  addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) go(idx + (dx < 0 ? 1 : -1));
  });

  /* Screen 3D tilt */
  addEventListener('mousemove', e => {
    const mx = (e.clientX / innerWidth - 0.5) * 2, my = (e.clientY / innerHeight - 0.5) * 2;
    const screen = DATA[idx].el.querySelector('.screen-3d');
    if (screen) gsap.to(screen, { rotateY: mx * 6, rotateX: -my * 4, duration: 0.6, ease: 'power2.out' });
  });

  animateIn(DATA[0].el);
})();
</script>
</body>
</html>
